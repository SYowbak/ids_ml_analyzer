name: CI

on:
  push:
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regression tests
        run: |
          pytest -q \
            tests/test_threshold_provenance_policy.py \
            tests/test_training_scanning_lifecycle_integration.py \
            tests/test_scanning_schema_precheck.py \
            tests/test_scanning_auto_model_choice.py \
            tests/test_model_engine_if_calibration.py \
            tests/test_database_path_resolution.py

  strict-e2e:
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bootstrap required model artifacts
        run: python scripts/bootstrap_required_models.py

      - name: Run strict PCAP E2E gate
        env:
          IDS_STRICT_E2E: "1"
        run: pytest -q -rs tests/test_pcap_real_e2e_regression.py
